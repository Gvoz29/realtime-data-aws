version: '3.8'

services:
  # 1 PMU - Phasor Measurement Unit - critical grid point
  device-pmu-01:
    build: ./simulator
    container_name: device-pmu-01
    restart: always
    volumes:
      - ./simulator/certs:/app/certs:ro
    environment:
      - DEVICE_ID=device_pmu_01
      - DEVICE_TYPE=PMU
      - DEVICE_PROFILE=critical
      - INTERVAL_MS=100
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_TOPIC=power_grid/measurements

  # 1 RTU - Remote Terminal Unit - substation
  device-rtu-01:
    build: ./simulator
    container_name: device-rtu-01
    restart: always
    volumes:
      - ./simulator/certs:/app/certs:ro
    environment:
      - DEVICE_ID=device_rtu_01
      - DEVICE_TYPE=RTU
      - DEVICE_PROFILE=unstable
      - INTERVAL_MS=500
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_TOPIC=power_grid/measurements

  # 8 SMART_METER - residential and commercial meters
