      - DEVICE_TYPE=SMART_METER
      - DEVICE_PROFILE=normal
      - INTERVAL_MS=2000
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_TOPIC=power_grid/measurements

